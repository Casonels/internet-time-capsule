<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Internet Time Capsule</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>

<header class="hero">
<h1>Internet Time Capsule</h1>
<p>Travel through the biggest moments in internet history.</p>
</header>

<main class="container">
<div class="glass">
<div class="year-display" id="yearTitle">2000</div>
<input type="range" min="1995" max="2026" value="2000" id="yearSlider">

<div class="timeline-card">
<span class="badge" id="era">Web Era</span>
<h2 id="eventTitle"></h2>
<p id="eventText"></p>
<p id="factText"></p>
</div>

<div class="stats">
<div class="stat"><span>Internet Users</span><strong id="users"></strong></div>
<div class="stat"><span>Year Selected</span><strong id="selectedYear"></strong></div>
</div>

<button id="randomBtn">Random Year</button>
</div>
</main>
<script src="script.js"></script>
</body>
</html>
