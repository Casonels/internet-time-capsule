<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Time Capsule</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🚀 Internet Time Capsule</h1>
  <p>Explore the web through the decades.</p>
</header>

<div class="container">
  <input type="range" min="1995" max="2026" value="2000" id="yearSlider">
  <h2 id="yearTitle">2000</h2>
  <div class="card">
    <h3 id="eventTitle"></h3>
    <p id="eventText"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
